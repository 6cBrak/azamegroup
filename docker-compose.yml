services:

  app:
    build: .
    container_name: azam_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./.env:/var/www/.env:ro
      - storage_data:/var/www/storage
      - ./public/images:/var/www/public/images
    networks:
      - azam_internal
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: azam_nginx
    restart: unless-stopped
    volumes:
      - ./public:/var/www/public:ro
      - ./public/images:/var/www/public/images
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/storage:ro
    networks:
      - azam_internal
      - web
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      # Routeur principal HTTPS (www)
      - "traefik.http.routers.azam.rule=Host(`www.azamgroupe.com`)"
      - "traefik.http.routers.azam.entrypoints=websecure"
      - "traefik.http.routers.azam.tls.certresolver=letsencrypt"
      - "traefik.http.services.azam.loadbalancer.server.port=80"

      # Redirection HTTP → HTTPS (www)
      - "traefik.http.routers.azam-http.rule=Host(`www.azamgroupe.com`)"
      - "traefik.http.routers.azam-http.entrypoints=web"
      - "traefik.http.routers.azam-http.middlewares=azam-https-redirect"

      # Redirection HTTP → HTTPS (non-www)
      - "traefik.http.routers.azam-nowww-http.rule=Host(`azamgroupe.com`)"
      - "traefik.http.routers.azam-nowww-http.entrypoints=web"
      - "traefik.http.routers.azam-nowww-http.middlewares=azam-https-redirect"

      # Routeur HTTPS non-www → redirect vers www
      - "traefik.http.routers.azam-nowww.rule=Host(`azamgroupe.com`)"
      - "traefik.http.routers.azam-nowww.entrypoints=websecure"
      - "traefik.http.routers.azam-nowww.tls.certresolver=letsencrypt"
      - "traefik.http.routers.azam-nowww.middlewares=azam-www"
      - "traefik.http.middlewares.azam-www.redirectregex.regex=^https://azamgroupe\\.com/(.*)"
      - "traefik.http.middlewares.azam-www.redirectregex.replacement=https://www.azamgroupe.com/$${1}"
      - "traefik.http.middlewares.azam-www.redirectregex.permanent=true"

      # Middleware HTTP → HTTPS
      - "traefik.http.middlewares.azam-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.azam-https-redirect.redirectscheme.permanent=true"

  db:
    image: mysql:8.0
    container_name: azam_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - azam_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  azam_internal:
    driver: bridge
  web:
    external: true

volumes:
  db_data:
  storage_data:
