server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Fichiers uploadés (storage) — servis directement depuis le volume
    location ^~ /storage/ {
        alias /var/www/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets — servis directement par nginx
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
        include fastcgi_params;
    }

    # Bloquer accès aux fichiers sensibles
    location ~ /\.(ht|git|env) {
        deny all;
    }
}
